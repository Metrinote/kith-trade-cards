<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kith Trade Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Righteous&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050805;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  h1 {
    font-family: 'Righteous', cursive;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 32px;
    color: #22c55e;
    text-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 320px;
  }
  a {
    display: block;
    padding: 16px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    transition: opacity 0.15s;
  }
  a:hover { opacity: 0.9; }
  .setup-link {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
  }
  .recap-link {
    background: linear-gradient(135deg, #0a100a, #080a08);
    color: #22c55e;
    border: 1px solid #0e2a12;
  }
</style>
</head>
<body>
  <h1>Kith Trade Lab</h1>
  <div class="cards">
    <a href="kith-setup.html" class="setup-link">Trade Setup</a>
    <a href="kith-trade-recap.html" class="recap-link">Trade Recap</a>
  </div>
</body>
</html>
